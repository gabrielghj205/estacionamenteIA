<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Estacionamentos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <main class="grid min-h-screen lg:grid-cols-[1fr_440px]">
      <section class="hidden bg-slate-900 px-12 py-10 text-white lg:flex lg:flex-col lg:justify-between">
        <div class="flex items-center gap-3">
          <img class="h-12 w-12 rounded-lg bg-white object-contain p-1" src="./assets/logo.png" alt="Logo Estacionamentos" />
          <span class="text-lg font-bold">Estacionamentos</span>
        </div>
        <div class="max-w-xl">
          <p class="text-sm font-medium uppercase tracking-wide text-blue-300">Controle operacional</p>
          <h1 class="mt-4 text-4xl font-bold leading-tight">Gestão de pátio para proprietários e mensalistas.</h1>
          <p class="mt-4 text-base text-slate-300">Acompanhe entradas, saídas, veículos ativos e histórico com acesso por perfil.</p>
        </div>
        <p class="text-sm text-slate-400">Sistema didático com Supabase e JavaScript Vanilla.</p>
      </section>

      <section class="flex items-center justify-center bg-slate-50 p-6 dark:bg-slate-900">
        <div class="w-full max-w-sm">
          <div class="mb-8 flex items-center justify-between">
            <div class="flex items-center gap-3">
              <img class="h-11 w-11 object-contain" src="./assets/logo.png" alt="Logo Estacionamentos" />
              <span class="font-bold text-slate-950 dark:text-white">Estacionamentos</span>
            </div>
            <button class="btn-secondary px-3" type="button" data-theme-toggle data-heroicon="moon" aria-label="Alternar tema"></button>
          </div>

          <form class="card space-y-5" data-login-form>
            <div>
              <h2 class="text-xl font-bold text-slate-950 dark:text-white">Entrar</h2>
              <p class="mt-1 text-sm text-slate-600 dark:text-slate-300">Informe suas credenciais.</p>
            </div>

            <div class="space-y-2">
              <label class="form-label" for="email">E-mail</label>
              <input class="form-input" id="email" name="email" type="email" autocomplete="email" required />
            </div>

            <div class="space-y-2">
              <label class="form-label" for="senha">Senha</label>
              <input class="form-input" id="senha" name="senha" type="password" autocomplete="current-password" required />
            </div>

            <button class="btn-primary w-full" type="submit" data-login-submit data-heroicon="logout">Entrar</button>

            <a class="block text-center text-sm font-medium text-blue-600 hover:text-blue-700 dark:text-blue-300" href="#">Esqueci minha senha</a>
          </form>
        </div>
      </section>
    </main>

    <script type="module" src="./js/pages/login.js"></script>
  </body>
</html>
