<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Estacionamentos</title>
    <script type="module" crossorigin src="./assets/login-CuQzkiNQ.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/alerts-B41tt2c_.js">
    <link rel="modulepreload" crossorigin href="./assets/layout-BAJKA9WQ.js">
    <link rel="stylesheet" crossorigin href="./assets/alerts-_Cc-lAj-.css">
  </head>
  <body>
    <main class="flex min-h-screen items-center justify-center bg-slate-50 p-6 dark:bg-slate-950">
      <section class="w-full max-w-md rounded-xl border border-slate-200 bg-white p-8 shadow-sm dark:border-slate-800 dark:bg-slate-900">
        <div class="mb-8 text-center">
          <img src="./assets/logo-DIVXN9jY.png" alt="Logo do sistema" class="mx-auto mb-4 h-16 w-16 rounded-xl object-contain">
          <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Estacionamentos</h1>
          <p class="mt-2 text-sm text-slate-600 dark:text-slate-300">Acesse sua conta para continuar.</p>
        </div>

        <form id="formLogin" class="space-y-4">
          <div>
            <label for="email" class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-200">E-mail</label>
            <input id="email" name="email" type="email" autocomplete="email" class="app-input" required>
          </div>
          <div>
            <label for="senha" class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-200">Senha</label>
            <input id="senha" name="senha" type="password" autocomplete="current-password" class="app-input" required>
          </div>
          <button class="app-button-primary w-full" type="submit">
            <span data-heroicon="arrowRightOnRectangle"></span>
            Entrar
          </button>
        </form>
      </section>
    </main>
  </body>
</html>
