<!doctype html>
<html lang="pt-BR">
  <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Clientes | Estacionamentos</title><script type="module" src="../js/pages/clientes.js"></script></head>
  <body><div id="app"><section class="space-y-6"><div class="app-card max-w-3xl"><h2 class="mb-4 text-lg font-bold">Cadastro de cliente</h2><form id="formCadastro" class="grid gap-4 sm:grid-cols-2"><input type="hidden" id="registroId"><div><label class="mb-1 block text-sm font-medium" for="nome">Nome</label><input id="nome" class="app-input" required></div><div><label class="mb-1 block text-sm font-medium" for="email">E-mail</label><input id="email" type="email" class="app-input" required></div><div><label class="mb-1 block text-sm font-medium" for="telefone">Telefone</label><input id="telefone" class="app-input"></div><div><label class="mb-1 block text-sm font-medium" for="user_id">ID do usuário Supabase</label><input id="user_id" class="app-input"></div><div class="sm:col-span-2"><button class="app-button-primary" type="submit"><span data-heroicon="plus"></span>Salvar</button></div></form></div><div class="app-card"><div class="overflow-x-auto"><table class="app-table"><thead><tr><th>Nome</th><th>E-mail</th><th>Telefone</th><th>Situação</th><th>Ações</th></tr></thead><tbody id="tabela"></tbody></table></div><div id="paginacao"></div></div></section></div></body>
</html>
