<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Histórico | Estacionamentos</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div class="min-h-screen md:grid md:grid-cols-[256px_1fr]">
      <aside class="fixed inset-y-0 left-0 z-40 w-64 -translate-x-full border-r border-slate-200 bg-white p-4 transition md:static md:translate-x-0 dark:border-slate-700 dark:bg-slate-800" data-sidebar>
        <div class="flex items-center gap-3 px-2"><img class="h-10 w-10 object-contain" src="../assets/logo.png" alt="Logo Estacionamentos" /><span class="font-bold text-slate-950 dark:text-white">Estacionamentos</span></div>
        <nav class="mt-8 space-y-1"><a class="nav-link" href="./dashboard.html" data-nav-link data-heroicon="home">Dashboard</a><a class="nav-link" href="./marcas.html" data-nav-link data-heroicon="tag">Marcas</a><a class="nav-link" href="./modelos.html" data-nav-link data-heroicon="collection">Modelos</a><a class="nav-link" href="./clientes.html" data-nav-link data-heroicon="users">Clientes</a><a class="nav-link" href="./veiculos.html" data-nav-link data-heroicon="truck">Veículos</a><a class="nav-link" href="./movimentacoes.html" data-nav-link data-heroicon="arrows">Entrada e saída</a><a class="nav-link" href="./patio.html" data-nav-link data-heroicon="list">Pátio</a><a class="nav-link" href="./historico.html" data-nav-link data-heroicon="clock">Histórico</a></nav>
      </aside>
      <div class="min-w-0">
        <header class="sticky top-0 z-30 flex h-16 items-center justify-between border-b border-slate-200 bg-white px-4 dark:border-slate-700 dark:bg-slate-800 md:px-6"><div class="flex items-center gap-3"><button class="btn-secondary px-3 md:hidden" type="button" data-menu-toggle data-heroicon="bars" aria-label="Abrir menu"></button><div><p class="text-sm font-semibold text-slate-950 dark:text-white" data-user-name>Usuário</p><p class="text-xs text-slate-500 dark:text-slate-300" data-user-role>Perfil</p></div></div><div class="flex items-center gap-2"><button class="btn-secondary px-3" type="button" data-theme-toggle data-heroicon="moon" aria-label="Alternar tema"></button><button class="btn-danger" type="button" data-logout data-heroicon="logout">Sair</button></div></header>
        <main class="p-6">
          <div class="mb-6"><h1 class="text-2xl font-bold text-slate-950 dark:text-white">Histórico</h1><p class="mt-1 text-sm text-slate-600 dark:text-slate-300">Consulta de movimentações encerradas e abertas.</p></div>
          <section class="card mb-6"><form class="grid gap-4 md:grid-cols-4"><input class="form-input" type="text" placeholder="Placa" /><input class="form-input" type="date" /><input class="form-input" type="date" /><button class="btn-primary" type="submit" data-heroicon="search">Filtrar</button></form></section>
          <section class="card"><div class="overflow-x-auto"><table class="w-full text-sm"><thead class="table-header"><tr><th class="px-4 py-3">Placa</th><th class="px-4 py-3">Entrada</th><th class="px-4 py-3">Saída</th><th class="px-4 py-3">Valor</th><th class="px-4 py-3">Status</th></tr></thead><tbody class="divide-y divide-slate-200 dark:divide-slate-700"><tr><td class="px-4 py-4 text-slate-500 dark:text-slate-300" colspan="5">Nenhuma movimentação encontrada.</td></tr></tbody></table></div></section>
        </main>
      </div>
    </div>
    <script type="module" src="../js/pages/crud-placeholder.js"></script>
  </body>
</html>
