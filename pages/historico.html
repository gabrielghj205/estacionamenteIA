<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico | Estacionamentos</title>
    <script type="module" src="../js/pages/historico.js"></script>
</head>

<body>
    <div id="app">
        <section class="app-card">
            <form id="formFiltros" class="mb-4 grid gap-4 md:grid-cols-5">
                <div><label class="mb-1 block text-sm font-medium" for="placa">Placa</label><input id="placa" class="app-input"></div>
                <div><label class="mb-1 block text-sm font-medium" for="inicio">Início</label><input id="inicio" type="date" class="app-input"></div>
                <div><label class="mb-1 block text-sm font-medium" for="fim">Fim</label><input id="fim" type="date" class="app-input"></div>
                <div><label class="mb-1 block text-sm font-medium" for="status">Status</label><select id="status" class="app-input"><option value="">Todos</option><option value="aberta">Aberta</option><option value="encerrada">Encerrada</option></select></div>
                <button
                    class="app-button-primary self-end" type="submit"><span data-heroicon="magnifyingGlass"></span>Filtrar</button>
            </form>
            <div class="overflow-x-auto">
                <table class="app-table">
                    <thead>
                        <tr>
                            <th>Placa</th>
                            <th>Cliente</th>
                            <th>Entrada</th>
                            <th>Saída</th>
                            <th>Valor</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaHistorico"></tbody>
                </table>
            </div>
            <div id="paginacao"></div>
        </section>
    </div>
</body>

</html>
