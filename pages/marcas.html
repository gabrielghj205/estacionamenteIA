<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marcas | Estacionamentos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div class="min-h-screen md:grid md:grid-cols-[256px_1fr]">
      <aside class="fixed inset-y-0 left-0 z-40 w-64 -translate-x-full border-r border-slate-200 bg-white p-4 transition md:static md:translate-x-0 dark:border-slate-700 dark:bg-slate-800" data-sidebar>
        <div class="flex items-center gap-3 px-2"><img class="h-10 w-10 object-contain" src="../assets/logo.png" alt="Logo Estacionamentos" /><span class="font-bold text-slate-950 dark:text-white">Estacionamentos</span></div>
        <nav class="mt-8 space-y-1">
          <a class="nav-link" href="./dashboard.html" data-nav-link data-heroicon="home">Dashboard</a><a class="nav-link" href="./marcas.html" data-nav-link data-heroicon="tag">Marcas</a><a class="nav-link" href="./modelos.html" data-nav-link data-heroicon="collection">Modelos</a><a class="nav-link" href="./clientes.html" data-nav-link data-heroicon="users">Clientes</a><a class="nav-link" href="./veiculos.html" data-nav-link data-heroicon="truck">Veículos</a><a class="nav-link" href="./movimentacoes.html" data-nav-link data-heroicon="arrows">Entrada e saída</a><a class="nav-link" href="./patio.html" data-nav-link data-heroicon="list">Pátio</a><a class="nav-link" href="./historico.html" data-nav-link data-heroicon="clock">Histórico</a>
        </nav>
      </aside>
      <div class="min-w-0">
        <header class="sticky top-0 z-30 flex h-16 items-center justify-between border-b border-slate-200 bg-white px-4 dark:border-slate-700 dark:bg-slate-800 md:px-6">
          <div class="flex items-center gap-3"><button class="btn-secondary px-3 md:hidden" type="button" data-menu-toggle data-heroicon="bars" aria-label="Abrir menu"></button><div><p class="text-sm font-semibold text-slate-950 dark:text-white" data-user-name>Usuário</p><p class="text-xs text-slate-500 dark:text-slate-300" data-user-role>Perfil</p></div></div>
          <div class="flex items-center gap-2"><button class="btn-secondary px-3" type="button" data-theme-toggle data-heroicon="moon" aria-label="Alternar tema"></button><button class="btn-danger" type="button" data-logout data-heroicon="logout">Sair</button></div>
        </header>
        <main class="p-6">
          <div class="mb-6 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
            <div><h1 class="text-2xl font-bold text-slate-950 dark:text-white">Marcas</h1><p class="mt-1 text-sm text-slate-600 dark:text-slate-300">Cadastro de marcas de veículos.</p></div>
            <button class="btn-primary" type="button" data-heroicon="plus">Nova marca</button>
          </div>
          <section class="card max-w-3xl">
            <form class="grid gap-4 sm:grid-cols-[1fr_auto]" data-marcas-form>
              <input type="hidden" data-marca-id />
              <div class="space-y-2"><label class="form-label" for="nome">Nome</label><input class="form-input" id="nome" name="nome" type="text" placeholder="Ex.: Toyota" data-marca-nome /></div>
              <div class="flex items-end gap-2"><button class="btn-primary w-full sm:w-auto" type="submit" data-marca-submit data-heroicon="save">Salvar</button><button class="btn-secondary hidden w-full sm:w-auto" type="button" data-marca-cancelar data-heroicon="cancel">Cancelar</button></div>
            </form>
          </section>
          <section class="card mt-6">
            <div class="overflow-x-auto"><table class="w-full text-sm"><thead class="table-header"><tr><th class="px-4 py-3">Nome</th><th class="px-4 py-3">Situação</th><th class="px-4 py-3 text-right">Ações</th></tr></thead><tbody class="divide-y divide-slate-200 dark:divide-slate-700" data-marcas-tbody><tr><td class="px-4 py-4 text-slate-500 dark:text-slate-300" colspan="3">Carregando marcas...</td></tr></tbody></table></div>
            <div data-marcas-pagination></div>
          </section>
        </main>
      </div>
    </div>
    <script type="module" src="../js/pages/marcas.js"></script>
  </body>
</html>
