<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movimentações | Estacionamentos</title>
    <script type="module" src="../js/pages/movimentacoes.js"></script>
</head>

<body>
    <div id="app">
        <section class="grid gap-6 xl:grid-cols-2">
            <div class="app-card">
                <h2 class="mb-4 text-lg font-bold">Registrar entrada</h2>
                <form id="formEntrada" class="space-y-4">
                    <div><label class="mb-1 block text-sm font-medium" for="placaEntrada">Placa</label><input id="placaEntrada" class="app-input" required></div>
                    <button class="app-button-primary" type="submit"><span data-heroicon="plus"></span>Confirmar entrada</button>
                </form>
            </div>
            <div class="app-card">
                <h2 class="mb-4 text-lg font-bold">Registrar saída</h2>
                <form id="formSaida" class="space-y-4">
                    <div><label class="mb-1 block text-sm font-medium" for="placaSaida">Placa</label><input id="placaSaida" class="app-input" required></div>
                    <div><label class="mb-1 block text-sm font-medium" for="valorCobrado">Valor cobrado</label><input id="valorCobrado" class="app-input" type="number" min="0" step="0.01" required></div>
                    <button class="app-button-primary" type="submit"><span data-heroicon="arrowRight"></span>Confirmar saída</button>
                </form>
            </div>
        </section>
    </div>
</body>

</html>
