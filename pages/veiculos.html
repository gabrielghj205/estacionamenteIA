<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Veículos | Estacionamentos</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div class="min-h-screen md:grid md:grid-cols-[256px_1fr]">
      <aside class="fixed inset-y-0 left-0 z-40 w-64 -translate-x-full border-r border-slate-200 bg-white p-4 transition md:static md:translate-x-0 dark:border-slate-700 dark:bg-slate-800" data-sidebar>
        <div class="flex items-center gap-3 px-2"><img class="h-10 w-10 object-contain" src="../assets/logo.png" alt="Logo Estacionamentos" /><span class="font-bold text-slate-950 dark:text-white">Estacionamentos</span></div>
        <nav class="mt-8 space-y-1"><a class="nav-link" href="./dashboard.html" data-nav-link data-heroicon="home">Dashboard</a><a class="nav-link" href="./marcas.html" data-nav-link data-heroicon="tag">Marcas</a><a class="nav-link" href="./modelos.html" data-nav-link data-heroicon="collection">Modelos</a><a class="nav-link" href="./clientes.html" data-nav-link data-heroicon="users">Clientes</a><a class="nav-link" href="./veiculos.html" data-nav-link data-heroicon="truck">Veículos</a><a class="nav-link" href="./movimentacoes.html" data-nav-link data-heroicon="arrows">Entrada e saída</a><a class="nav-link" href="./patio.html" data-nav-link data-heroicon="list">Pátio</a><a class="nav-link" href="./historico.html" data-nav-link data-heroicon="clock">Histórico</a></nav>
      </aside>
      <div class="min-w-0">
        <header class="sticky top-0 z-30 flex h-16 items-center justify-between border-b border-slate-200 bg-white px-4 dark:border-slate-700 dark:bg-slate-800 md:px-6">
          <div class="flex items-center gap-3"><button class="btn-secondary px-3 md:hidden" type="button" data-menu-toggle data-heroicon="bars" aria-label="Abrir menu"></button><div><p class="text-sm font-semibold text-slate-950 dark:text-white" data-user-name>Usuário</p><p class="text-xs text-slate-500 dark:text-slate-300" data-user-role>Perfil</p></div></div>
          <div class="flex items-center gap-2"><button class="btn-secondary px-3" type="button" data-theme-toggle data-heroicon="moon" aria-label="Alternar tema"></button><button class="btn-danger" type="button" data-logout data-heroicon="logout">Sair</button></div>
        </header>
        <main class="p-6">
          <div class="mb-6 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between"><div><h1 class="text-2xl font-bold text-slate-950 dark:text-white">Veículos</h1><p class="mt-1 text-sm text-slate-600 dark:text-slate-300">Cadastro de veículos mensalistas e avulsos.</p></div><button class="btn-primary" type="button" data-heroicon="plus">Novo veículo</button></div>
          <section class="card max-w-3xl">
            <form class="grid gap-4 sm:grid-cols-2" data-veiculos-form>
              <input type="hidden" data-veiculo-id />
              <div class="space-y-2"><label class="form-label" for="placa">Placa</label><input class="form-input" id="placa" name="placa" type="text" data-veiculo-placa /></div>
              <div class="space-y-2"><label class="form-label" for="cor">Cor</label><input class="form-input" id="cor" name="cor" type="text" data-veiculo-cor /></div>
              <div class="space-y-2"><label class="form-label" for="marca">Marca</label><select class="form-input" id="marca" name="marca" data-veiculo-marca><option value="">Selecione</option></select></div>
              <div class="space-y-2"><label class="form-label" for="modelo">Modelo</label><select class="form-input" id="modelo" name="modelo" data-veiculo-modelo><option value="">Selecione</option></select></div>
              <div class="space-y-2"><label class="form-label" for="tipo_cliente">Tipo</label><select class="form-input" id="tipo_cliente" name="tipo_cliente" data-veiculo-tipo><option value="avulso">Avulso</option><option value="mensalista">Mensalista</option></select></div>
              <div class="space-y-2"><label class="form-label" for="cliente">Cliente</label><select class="form-input" id="cliente" name="cliente" data-veiculo-cliente><option value="">Sem vínculo</option></select></div>
              <div class="flex gap-2 sm:col-span-2"><button class="btn-primary" type="submit" data-veiculo-submit data-heroicon="save">Salvar</button><button class="btn-secondary hidden" type="button" data-veiculo-cancelar data-heroicon="cancel">Cancelar</button></div>
            </form>
          </section>
          <section class="card mt-6"><div class="overflow-x-auto"><table class="w-full text-sm"><thead class="table-header"><tr><th class="px-4 py-3">Placa</th><th class="px-4 py-3">Veículo</th><th class="px-4 py-3">Cliente</th><th class="px-4 py-3">Tipo</th><th class="px-4 py-3">Situação</th><th class="px-4 py-3 text-right">Ações</th></tr></thead><tbody class="divide-y divide-slate-200 dark:divide-slate-700" data-veiculos-tbody><tr><td class="px-4 py-4 text-slate-500 dark:text-slate-300" colspan="6">Carregando veículos...</td></tr></tbody></table></div><div data-veiculos-pagination></div></section>
        </main>
      </div>
    </div>
    <script type="module" src="../js/pages/veiculos.js"></script>
  </body>
</html>
