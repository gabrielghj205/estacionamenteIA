<!doctype html>
<html lang="pt-BR">
  <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Veículos | Estacionamentos</title><script type="module" src="../js/pages/veiculos.js"></script></head>
  <body><div id="app"><section class="space-y-6"><div class="app-card max-w-3xl"><h2 class="mb-4 text-lg font-bold">Cadastro de veículo</h2><form id="formCadastro" class="grid gap-4 sm:grid-cols-2"><input type="hidden" id="registroId"><div><label class="mb-1 block text-sm font-medium" for="placa">Placa</label><input id="placa" class="app-input" required></div><div><label class="mb-1 block text-sm font-medium" for="tipo_cliente">Tipo</label><select id="tipo_cliente" class="app-input"><option value="mensalista">Mensalista</option><option value="avulso">Avulso</option></select></div><div><label class="mb-1 block text-sm font-medium" for="cliente_id">Cliente</label><select id="cliente_id" class="app-input"></select></div><div><label class="mb-1 block text-sm font-medium" for="marca_id">Marca</label><select id="marca_id" class="app-input" required></select></div><div><label class="mb-1 block text-sm font-medium" for="modelo_id">Modelo</label><select id="modelo_id" class="app-input" required></select></div><div><label class="mb-1 block text-sm font-medium" for="cor">Cor</label><input id="cor" class="app-input"></div><div class="sm:col-span-2"><button class="app-button-primary" type="submit"><span data-heroicon="plus"></span>Salvar</button></div></form></div><div class="app-card"><div class="overflow-x-auto"><table class="app-table"><thead><tr><th>Placa</th><th>Cliente</th><th>Marca</th><th>Modelo</th><th>Situação</th><th>Ações</th></tr></thead><tbody id="tabela"></tbody></table></div><div id="paginacao"></div></div></section></div></body>
</html>
